<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Log Book Asset</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <!-- HEADER -->
        <div class="header">
            INFORMASI ASET
        </div>

        <div class="content">

            <!-- FOTO -->
            <div class="image-box">
                <img id="foto" src="" alt="Foto Asset">
            </div>

            <!-- IDENTITAS ASET -->
            <div class="asset-header">

                <div class="category-badge" id="kategori">
                    -
                </div>

                <h1 class="title" id="nama">
                    Memuat Data...
                </h1>

                <div class="qr-number">
                    Nomor QR :
                    <strong id="qr">-</strong>
                </div>

            </div>

            <!-- INFORMASI BARANG -->

            <div class="section-title">
                INFORMASI BARANG
            </div>

            <div class="info-list">

                <div class="info-item">
                    <span>Jumlah</span>
                    <strong id="jumlah">-</strong>
                </div>

                <div class="info-item" id="merkRow">
                    <span>Merk</span>
                    <strong id="merk">-</strong>
                </div>

                <div class="info-item" id="serialRow">
                    <span>Serial Number</span>
                    <strong id="serialNumber">-</strong>
                </div>

                <div class="info-item" id="dimensiRow">
                    <span>Dimensi</span>
                    <strong id="dimensi">-</strong>
                </div>

                <div class="info-item" id="warnaRow">
                    <span>Warna</span>
                    <strong id="warna">-</strong>
                </div>

            </div>

            <!-- LOKASI -->

            <div class="section-title">
                LOKASI & KONDISISI
            </div>

            <div class="info-list">

                <div class="info-item">
                    <span>Area</span>
                    <strong id="area">-</strong>
                </div>

                <div class="info-item">
                    <span>Lokasi</span>
                    <strong id="lokasi">-</strong>
                </div>

                <div class="info-item">
                    <span>Keadaan</span>
                    <strong id="keadaan">-</strong>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
