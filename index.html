<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membuka Data Aset...</title>

    <script>
        // Ambil ID dari URL
        const id = window.location.pathname.replace("/", "");

        // URL Apps Script
        const baseUrl = "https://script.google.com/macros/s/AKfycbzWd7pEwjJY14EI4VWDFMoJrAlzdLl549iKR6jtnvqh3g0i9WffkYp07LXuIkACb5zLZA/exec";

        if(id){
            window.location.href = baseUrl + "?id=" + encodeURIComponent(id);
        }else{
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("status").innerHTML =
                    "<h2>ID aset tidak ditemukan.</h2>";
            });
        }
    </script>

</head>
<body style="font-family:Arial;text-align:center;padding-top:80px">

<h2 id="status">Membuka data aset...</h2>

</body>
</html>
